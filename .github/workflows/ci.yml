name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # shared-types no tiene build script: se consume como TS source directo via workspaces

      - name: Type-check shared-types
        run: npm run type-check --workspace=packages/shared-types

      - name: Type-check API
        run: npm run type-check --workspace=apps/api

      - name: Build API
        run: npm run build --workspace=apps/api

      # next build requiere variables de entorno y hace generacion estatica — type-check cubre la compilacion TS
      - name: Type-check Web
        run: npm run type-check --workspace=apps/web
